<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111827" />
  <title>誰是臥底｜抽身份模擬器</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --primary: #111827;
      --primary-hover: #1f2937;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC",
        "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    button, input { font: inherit; }

    .app {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .title {
      margin: 8px 0 4px;
      text-align: center;
      font-size: 30px;
    }

    .subtitle {
      margin: 0 0 24px;
      text-align: center;
      color: var(--muted);
      line-height: 1.6;
    }

    .panel {
      background: var(--card);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
    }

    .hidden { display: none !important; }

    .field-group { margin-bottom: 18px; }

    .field-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 10px;
    }

    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 14px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.1);
    }

    .helper {
      margin-top: 7px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .button {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 800;
    }

    .button:active { transform: scale(0.985); }

    .button-primary {
      background: var(--primary);
      color: #fff;
    }

    .button-primary:hover { background: var(--primary-hover); }

    .button-secondary {
      background: #e5e7eb;
      color: var(--text);
    }

    .button-danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .summary {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .player-number {
      margin: 8px 0 4px;
      text-align: center;
      font-size: 20px;
      font-weight: 900;
    }

    .instruction {
      margin: 0 0 18px;
      text-align: center;
      font-size: 26px;
      line-height: 1.35;
    }

    .identity-card {
      min-height: 300px;
      border: 2px dashed var(--border);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      background: #f9fafb;
      user-select: none;
    }

    .cover-icon { font-size: 64px; margin-bottom: 12px; }

    .cover-text {
      color: var(--muted);
      line-height: 1.6;
    }

    .role {
      margin-bottom: 8px;
      font-size: 18px;
      color: var(--muted);
    }

    .role-name {
      margin: 0 0 22px;
      font-size: 38px;
    }

    .word-label {
      margin-bottom: 6px;
      color: var(--muted);
    }

    .word {
      font-size: 32px;
      font-weight: 900;
      word-break: break-word;
    }

    .blank-word {
      color: var(--muted);
      font-style: italic;
    }

    .message {
      min-height: 24px;
      margin: 14px 0 0;
      color: var(--danger);
      font-size: 14px;
      text-align: center;
    }

    .finish {
      text-align: center;
      padding: 30px 6px;
    }

    .finish-icon { font-size: 68px; }

    .finish h2 {
      margin: 12px 0 8px;
      font-size: 30px;
    }

    .finish p {
      color: var(--muted);
      line-height: 1.6;
    }

    .result-list {
      display: grid;
      gap: 10px;
      margin: 18px 0;
      text-align: left;
    }

    .result-item {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #f9fafb;
    }

    .result-player { font-weight: 900; }

    .result-detail { line-height: 1.6; }

    .result-role { font-weight: 800; }

    .result-word {
      color: var(--muted);
      word-break: break-word;
    }

    @media (max-width: 420px) {
      .app { padding-top: 16px; }
      .panel { padding: 16px; }
      .field-row { grid-template-columns: 1fr 92px; }
      .instruction { font-size: 23px; }
      .identity-card { min-height: 280px; }
      .word { font-size: 28px; }
      .result-item { grid-template-columns: 76px 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1 class="title">誰是臥底</h1>
    <p class="subtitle">自訂身份內容與人數，依序把手機交給每位玩家抽卡。</p>

    <section id="setupPanel" class="panel">
      <div class="field-group">
        <label for="civilianWord">平民內容與人數</label>
        <div class="field-row">
          <input id="civilianWord" type="text" value="蘋果" placeholder="例如：蘋果" />
          <input id="civilianCount" type="number" value="6" min="0" max="99" inputmode="numeric" />
        </div>
      </div>

      <div class="field-group">
        <label for="undercoverWord">臥底內容與人數</label>
        <div class="field-row">
          <input id="undercoverWord" type="text" value="水梨" placeholder="例如：水梨" />
          <input id="undercoverCount" type="number" value="1" min="0" max="99" inputmode="numeric" />
        </div>
      </div>

      <div class="field-group">
        <label for="blankWord">空白身份顯示內容與人數</label>
        <div class="field-row">
          <input id="blankWord" type="text" value="" placeholder="可留空，或輸入提示文字" />
          <input id="blankCount" type="number" value="1" min="0" max="99" inputmode="numeric" />
        </div>
      </div>

      <button id="startButton" class="button button-primary">開始抽身份</button>
      <div id="setupMessage" class="message"></div>
    </section>

    <section id="gamePanel" class="panel hidden">
      <div class="summary">
        <span id="progressText">1 號玩家 / 共 8 人</span>
        <span id="remainingText">剩餘 8 張</span>
      </div>

      <div class="player-number" id="playerNumber">1 號玩家</div>
      <h2 id="instruction" class="instruction">請確認沒有人偷看</h2>

      <div class="identity-card">
        <div id="coverContent">
          <div class="cover-icon">🕵️</div>
          <div class="cover-text">點擊下方按鈕<br />查看你的身份</div>
        </div>

        <div id="revealedContent" class="hidden">
          <div class="role">你的身份是</div>
          <div id="roleName" class="role-name">平民</div>
          <div class="word-label">你的提示詞</div>
          <div id="wordText" class="word">蘋果</div>
        </div>
      </div>

      <button id="revealButton" class="button button-primary" style="margin-top: 16px;">
        查看身份
      </button>

      <button id="nextButton" class="button button-primary hidden" style="margin-top: 16px;">
        我看完了，交給下一位
      </button>

      <div class="button-row">
        <button id="restartButton" class="button button-secondary">重新洗牌</button>
        <button id="backButton" class="button button-danger">返回設定</button>
      </div>
    </section>

    <section id="finishPanel" class="panel hidden">
      <div class="finish">
        <div class="finish-icon">✅</div>
        <h2>所有玩家都抽完了</h2>
        <p>按下一步可以查看每號玩家的身份與提示詞。</p>
        <button id="showResultsButton" class="button button-primary">下一步：查看身份總覽</button>
        <button id="finishRestartButton" class="button button-secondary" style="margin-top: 10px;">
          使用相同設定重新洗牌
        </button>
        <button id="finishBackButton" class="button button-secondary" style="margin-top: 10px;">
          返回修改設定
        </button>
      </div>
    </section>

    <section id="resultsPanel" class="panel hidden">
      <div class="finish">
        <div class="finish-icon">📋</div>
        <h2>身份總覽</h2>
        <p>以下依照抽卡順序，列出每號玩家的身份與提示詞。</p>
        <div id="resultsList" class="result-list"></div>

        <button id="resultsRestartButton" class="button button-primary">
          使用相同設定重新洗牌
        </button>
        <button id="resultsBackButton" class="button button-secondary" style="margin-top: 10px;">
          返回修改設定
        </button>
      </div>
    </section>
  </main>

  <script>
    const setupPanel = document.getElementById("setupPanel");
    const gamePanel = document.getElementById("gamePanel");
    const finishPanel = document.getElementById("finishPanel");
    const resultsPanel = document.getElementById("resultsPanel");

    const civilianWordInput = document.getElementById("civilianWord");
    const undercoverWordInput = document.getElementById("undercoverWord");
    const blankWordInput = document.getElementById("blankWord");
    const civilianCountInput = document.getElementById("civilianCount");
    const undercoverCountInput = document.getElementById("undercoverCount");
    const blankCountInput = document.getElementById("blankCount");

    const setupMessage = document.getElementById("setupMessage");
    const progressText = document.getElementById("progressText");
    const remainingText = document.getElementById("remainingText");
    const playerNumber = document.getElementById("playerNumber");
    const instruction = document.getElementById("instruction");
    const coverContent = document.getElementById("coverContent");
    const revealedContent = document.getElementById("revealedContent");
    const roleName = document.getElementById("roleName");
    const wordText = document.getElementById("wordText");
    const resultsList = document.getElementById("resultsList");

    const startButton = document.getElementById("startButton");
    const revealButton = document.getElementById("revealButton");
    const nextButton = document.getElementById("nextButton");
    const restartButton = document.getElementById("restartButton");
    const backButton = document.getElementById("backButton");
    const showResultsButton = document.getElementById("showResultsButton");
    const finishRestartButton = document.getElementById("finishRestartButton");
    const finishBackButton = document.getElementById("finishBackButton");
    const resultsRestartButton = document.getElementById("resultsRestartButton");
    const resultsBackButton = document.getElementById("resultsBackButton");

    let cards = [];
    let currentIndex = 0;
    let lastSettings = null;

    function parseCount(input) {
      const value = Number.parseInt(input.value, 10);
      return Number.isFinite(value) && value >= 0 ? value : 0;
    }

    function shuffle(array) {
      const result = [...array];
      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }

    function readSettings() {
      return {
        civilianWord: civilianWordInput.value.trim(),
        undercoverWord: undercoverWordInput.value.trim(),
        blankWord: blankWordInput.value.trim(),
        civilianCount: parseCount(civilianCountInput),
        undercoverCount: parseCount(undercoverCountInput),
        blankCount: parseCount(blankCountInput)
      };
    }

    function validateSettings(settings) {
      const total = settings.civilianCount + settings.undercoverCount + settings.blankCount;

      if (total < 2) return "總玩家人數至少需要 2 人。";
      if (settings.civilianCount > 0 && !settings.civilianWord) return "請輸入平民的內容。";
      if (settings.undercoverCount > 0 && !settings.undercoverWord) return "請輸入臥底的內容。";
      if (settings.undercoverCount === 0 && settings.blankCount === 0) {
        return "至少需要 1 位臥底或空白身份。";
      }
      return "";
    }

    function buildCards(settings) {
      const result = [];

      for (let i = 0; i < settings.civilianCount; i++) {
        result.push({ role: "平民", word: settings.civilianWord });
      }

      for (let i = 0; i < settings.undercoverCount; i++) {
        result.push({ role: "臥底", word: settings.undercoverWord });
      }

      for (let i = 0; i < settings.blankCount; i++) {
        result.push({ role: "空白", word: settings.blankWord || "" });
      }

      return shuffle(result);
    }

    function showPanel(panel) {
      setupPanel.classList.add("hidden");
      gamePanel.classList.add("hidden");
      finishPanel.classList.add("hidden");
      resultsPanel.classList.add("hidden");
      panel.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetCardView() {
      coverContent.classList.remove("hidden");
      revealedContent.classList.add("hidden");
      revealButton.classList.remove("hidden");
      nextButton.classList.add("hidden");
      instruction.textContent = "請確認沒有人偷看";
    }

    function updateProgress() {
      const total = cards.length;
      const player = currentIndex + 1;
      const remaining = total - currentIndex;

      progressText.textContent = `${player} 號玩家 / 共 ${total} 人`;
      remainingText.textContent = `剩餘 ${remaining} 張`;
      playerNumber.textContent = `${player} 號玩家`;
    }

    function startGame(settings) {
      cards = buildCards(settings);
      currentIndex = 0;
      lastSettings = settings;
      setupMessage.textContent = "";
      updateProgress();
      resetCardView();
      showPanel(gamePanel);
    }

    function renderResults() {
      resultsList.innerHTML = "";

      cards.forEach((card, index) => {
        const item = document.createElement("div");
        item.className = "result-item";

        const player = document.createElement("div");
        player.className = "result-player";
        player.textContent = `${index + 1} 號玩家`;

        const detail = document.createElement("div");
        detail.className = "result-detail";

        const role = document.createElement("div");
        role.className = "result-role";
        role.textContent = `身份：${card.role}`;

        const word = document.createElement("div");
        word.className = "result-word";
        word.textContent = `提示詞：${card.word}`;

        detail.appendChild(role);
        detail.appendChild(word);
        item.appendChild(player);
        item.appendChild(detail);
        resultsList.appendChild(item);
      });
    }

    function returnToSetup() {
      showPanel(setupPanel);
      setupMessage.textContent = "";
    }

    startButton.addEventListener("click", () => {
      const settings = readSettings();
      const error = validateSettings(settings);

      if (error) {
        setupMessage.textContent = error;
        return;
      }

      startGame(settings);
    });

    revealButton.addEventListener("click", () => {
      const card = cards[currentIndex];

      roleName.textContent = card.role;
      wordText.textContent = card.word;
      wordText.classList.toggle("blank-word", card.role === "空白");

      coverContent.classList.add("hidden");
      revealedContent.classList.remove("hidden");
      revealButton.classList.add("hidden");
      nextButton.classList.remove("hidden");
      instruction.textContent = "請記住內容，不要告訴別人";

      nextButton.textContent =
        currentIndex === cards.length - 1
          ? "我看完了，完成抽卡"
          : "我看完了，交給下一位";
    });

    nextButton.addEventListener("click", () => {
      currentIndex += 1;

      if (currentIndex >= cards.length) {
        showPanel(finishPanel);
        return;
      }

      updateProgress();
      resetCardView();
    });

    restartButton.addEventListener("click", () => {
      if (lastSettings) startGame(lastSettings);
    });

    backButton.addEventListener("click", returnToSetup);

    showResultsButton.addEventListener("click", () => {
      renderResults();
      showPanel(resultsPanel);
    });

    finishRestartButton.addEventListener("click", () => {
      if (lastSettings) startGame(lastSettings);
    });

    finishBackButton.addEventListener("click", returnToSetup);

    resultsRestartButton.addEventListener("click", () => {
      if (lastSettings) startGame(lastSettings);
    });

    resultsBackButton.addEventListener("click", returnToSetup);
  </script>
</body>
</html>
